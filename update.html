<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title data-i18n="updates_title">News & Updates — TSD Myanmar</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/update.css">
  <link id="site-favicon" rel="icon" href="/assets/images/logo/logo_en.svg" type="image/svg+xml">
  <script>
    (function(){
      try{
        const k = 'tsd_theme';
        const stored = localStorage.getItem(k) || 'system';
        if (stored === 'system'){
          const dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', dark? 'dark':'light');
        } else {
          document.documentElement.setAttribute('data-theme', stored);
        }
      }catch(e){}
    })();
  </script>
</head>
<body>
  <div class="ud-shell">
    <div id="header"></div>

    <main class="ud-main" id="update-detail-root">

      <!-- Breadcrumb -->
      <nav class="ud-breadcrumb" aria-label="Breadcrumb">
        <div class="ud-breadcrumb__inner">
          <a href="/updates.html" class="ud-back" data-i18n="back_to_updates">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
            All Updates
          </a>
        </div>
      </nav>

      <!-- Article header -->
      <header class="ud-header">
        <div class="ud-header__inner">
          <div class="ud-header__meta">
            <span class="ud-tag" id="update-badge"></span>
            <time class="ud-date" id="update-date"></time>
          </div>
          <h1 class="ud-title" id="update-title">Loading…</h1>
          <p class="ud-lead" id="update-summary"></p>
        </div>
      </header>

      <!-- Hero image (injected by JS) -->
      <div class="ud-hero-img" id="ud-hero-img"></div>

      <!-- Article body -->
      <article class="ud-article" id="update-article" role="article">
        <div class="ud-body" id="update-body" aria-live="polite">
          <div class="skeleton skel-line" style="width:70%"></div>
          <div class="skeleton skel-line"></div>
          <div class="skeleton skel-line"></div>
          <div class="skeleton skel-line" style="width:85%"></div>
          <div class="skeleton skel-line" style="width:60%"></div>
        </div>

        <!-- Downloads (populated by JS) -->
        <div class="ud-downloads" id="update-ctas"></div>

        <!-- Share -->
        <footer class="ud-share" id="share-bar"></footer>
      </article>

      <!-- Related -->
      <section class="ud-related" id="related-section">
        <div class="ud-related__inner">
          <h2 class="ud-related__heading" data-i18n="related_posts">More Updates</h2>
          <div class="ud-related__grid" id="related-grid"></div>
        </div>
      </section>

    </main>

    <div id="footer"></div>
  </div>

  <script src="/js/core/theme.js"></script>
  <script src="/js/core/icon-theme.js"></script>
  <script src="/js/core/header.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/core/i18n.js"></script>
  <script src="/js/core/news.js"></script>
  <script src="/js/pages/update-detail.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
