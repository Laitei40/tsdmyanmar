<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Impact & Reports - TSD Myanmar</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="/manifest.json">
  <link id="site-favicon" rel="icon" href="/assets/images/logo/logo_en.svg" type="image/svg+xml">
  <script>
    (function(){
      try{
        const k = 'tsd_theme';
        const stored = localStorage.getItem(k) || 'system';
        if (stored === 'system'){
          const dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', dark? 'dark':'light');
        } else {
          document.documentElement.setAttribute('data-theme', stored);
        }
      }catch(e){}
    })();
  </script>
</head>
<body>
  <!-- Header loaded dynamically -->
  <div id="header"></div>

  <main>
    <div class="page-banner">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/" data-i18n="nav_home">Home</a>
        <span class="sep" aria-hidden="true">/</span>
        <span class="current" data-i18n="impact_title">Impact &amp; Reports</span>
      </nav>
      <h1 data-i18n="impact_title">Impact &amp; Reports</h1>
      <p class="lead">Annual reports, activity summaries, and financial statements.</p>
    </div>

    <section class="content-section">
      <div class="coming-soon">
        <span class="coming-soon__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </span>
        <h2>Reports coming soon</h2>
        <p>We're preparing our published reports and impact summaries for this page. In the meantime, see our <a href="updates.html">latest updates</a> or <a href="contact.html">get in touch</a> for specific reports.</p>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="js/core/theme.js"></script>
  <script src="js/core/icon-theme.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/core/i18n.js"></script>
  <script src="js/main.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
