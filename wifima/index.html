                    {"h": "အချိန်စတင်ခြင်း", "p": "<strong>တစ်ကြိမ်သုံး:</strong> လော့ဂ်အင် ဝင်ပြီးသည်နှင့် အချိန်စတင်ပြီး ဆက်တိုက် သွားနေမည်။<br><strong>ပြန်လည်စတင်နိုင်သော:</strong> ချိတ်ဆက်ထားသည့် အချိန်ကိုသာ ရေတွက်မည်။"},
                    {"h": "အလိုအလျောက် သက်တမ်းကုန်ဆုံးခြင်း", "p": "ဝယ်ယူထားသော အချိန်ကာလ ကုန်ဆုံးသွားပါက အင်တာနက်ချိတ်ဆက်မှု အလိုအလျောက် ရပ်တန့်သွားမည်။"},
                    {"h": "တရားမျှတစွာ အသုံးပြုခြင်း မူဝါဒ", "p": "အခြားအသုံးပြုသူများအတွက် ကွန်ရက်ကို အလွန်အမင်း နှေးကွေးစေမည့် လုပ်ဆောင်ချက်များကို ရှောင်ကြဉ်ပါ။"},
                    {"h": "တရားမဝင် လုပ်ဆောင်မှုများ တားမြစ်ထားသည်", "p": "ကွန်ရက်ကို ဟက်ကင်းလုပ်ခြင်း၊ တရားမဝင် ဒေါင်းလုဒ် ဆွဲခြင်း၊ လိမ်လည်ခြင်းများအတွက် အသုံးမပြုရပါ။"},
                    {"h": "အသုံးပြုသူ၏ စက်ပိုင်းဆိုင်ရာ တာဝန်ယူမှု", "p": "အသုံးပြုသူများသည် မိမိတို့၏ ကိုယ်ပိုင်စက်များ၏ လုံခြုံရေးအတွက် တာဝန်ရှိပါသည်။"},
                    {"h": "ဝန်ဆောင်မှု ရရှိနိုင်မှု", "p": "ကွန်ရက်အသုံးပြုမှု များခြင်း သို့မဟုတ် နည်းပညာပိုင်းဆိုင်ရာ ပြဿနာများကြောင့် အင်တာနက် အမြန်နှုန်း ကွာခြားနိုင်ပါသည်။"},
                    {"h": "ချိတ်ဆက်မှု ဖြတ်တောက်နိုင်ခြင်း", "p": "ကွန်ရက် စီမံခန့်ခွဲသူသည် ဝန်ဆောင်မှုကို အလွဲသုံးစားလုပ်သော အသုံးပြုသူများကို ချိတ်ဆက်မှု ဖြတ်တောက်နိုင်ပါသည်။"}
                ],
                "footer": "အိုင်တီ & ဆက်သွယ်ရေး အဖွဲ့ | တီအက်စ်ဒီ"
            }
        };

        function getPlanBadge(planName) {
            const isPremium = planName === 'Premium' || planName === 'ပရီမီယံ';
            if (isPremium) {
                return `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-gradient-to-r from-purple-500 to-indigo-500 text-white shadow-sm ring-1 ring-inset ring-purple-600/20 uppercase tracking-wider">
                            <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"></path></svg>
                            ${planName}
                        </span>`;
            } else {
                return `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-slate-100 text-slate-700 shadow-sm ring-1 ring-inset ring-slate-200 uppercase tracking-wider">
                            ${planName}
                        </span>`;
            }
        }

        function renderContent() {
            const lang = document.getElementById('language').value;
            const filter = document.getElementById('plan-filter').value;
            const content = siteData[lang];

            if (!content) return;

            // UI strings update
            document.getElementById('opt-all').textContent = content.ui.all;
            document.getElementById('opt-basic').textContent = content.ui.basic;
            document.getElementById('opt-premium').textContent = content.ui.premium;
            document.getElementById('hero-subtitle').textContent = content.ui.subtitle;
            document.getElementById('hero-desc').textContent = content.ui.desc;

            // Header & Title
            document.getElementById('page-title').textContent = content.title;
            document.title = content.title;

            // Table Headers
            const thead = document.getElementById('table-head');
            thead.innerHTML = '<tr>' + content.headers.map((h, i) => 
                `<th scope="col" class="px-6 py-4 font-semibold text-slate-600 tracking-wider whitespace-nowrap">${h}</th>`
            ).join('') + '</tr>';

            // Filter logic
            const tbody = document.getElementById('table-body');
            const emptyState = document.getElementById('empty-state');
            
            const filteredPlans = content.plans.filter(row => {
                const planName = row[0];
                if (filter === 'all') return true;
                if (filter === 'basic') return planName === 'Basic' || planName === 'အခြေခံ';
                if (filter === 'premium') return planName === 'Premium' || planName === 'ပရီမီယံ';
                return true;
            });

            // Render Rows
            if (filteredPlans.length > 0) {
                emptyState.classList.add('hidden');
                tbody.innerHTML = filteredPlans.map(row => {
                    const planBadge = getPlanBadge(row[0]);
                    return `<tr class="hover:bg-brand-50/50 transition-colors group">
                        <td class="px-6 py-4 whitespace-nowrap">${planBadge}</td>
                        <td class="px-6 py-4 whitespace-nowrap font-medium text-slate-800">${row[1]}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-slate-600 text-sm">${row[2]}</td>
                        <td class="px-6 py-4 whitespace-nowrap font-bold text-brand-600">${row[3]}</td>
                        <td class="px-6 py-4 whitespace-nowrap font-bold ${row[4] === '-' ? 'text-slate-300' : 'text-indigo-600'}">${row[4]}</td>
                    </tr>`;
                }).join('');
            } else {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            }

            // Render Rules
            document.getElementById('rules-title').textContent = content.rulesTitle;
            const rulesContainer = document.getElementById('rules-container');
            rulesContainer.innerHTML = content.rules.map((rule, index) => `
                <div class="bg-white p-6 rounded-xl border border-slate-100 shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all duration-300 relative overflow-hidden group">
                    <div class="w-10 h-10 rounded-full bg-brand-50 flex items-center justify-center text-brand-600 mb-4 group-hover:scale-110 group-hover:bg-brand-500 group-hover:text-white transition-all duration-300">
                        <span class="font-bold text-sm">${index + 1}</span>
                    </div>
                    <h3 class="text-base font-bold text-slate-800 mb-2">${rule.h}</h3>
                    <p class="text-slate-500 text-sm leading-relaxed">${rule.p}</p>
                </div>
            `).join('');

            // Footer
            document.getElementById('footer-text').textContent = content.footer;
        }

        // Initialize and set default to user preference (Mara is first in the select, but let's ensure it renders)
        window.onload = () => {
            renderContent();
        };
    </script>
</body>
</html>
