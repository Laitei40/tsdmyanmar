name = "tsd-admin"
# Use a supported date to avoid runtime fallback warnings.
compatibility_date = "2026-01-07"

# Pages output directory (vanilla HTML/CSS/JS — no build step needed)
pages_build_output_dir = "public"

# Bind Cloudflare R2 bucket for image uploads
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "tsd-images"

# Bind D1 for admin APIs
[[d1_databases]]
binding = "UPDATES_DB"
database_name = "tsd_updates"
database_id = "bb376db4-497c-4ac3-9761-675b8a537422"  # replace if needed

# Auth: self-built email+password sessions (see admin/_lib/auth.js), backed by the
# admin_users / admin_sessions tables in this D1 database. No Cloudflare Access,
# no ADMIN_EMAIL, and no extra secrets to configure — session tokens are opaque
# random values, stored server-side only as a SHA-256 hash.
