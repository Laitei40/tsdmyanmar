<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSD News Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/assets/images/logo/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <!-- Quill.js WYSIWYG editor -->
  <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" />
</head>
<body>

  <!-- ── Toast container ── -->
  <div id="toast-container" class="toast-container"></div>

  <div class="app-shell auth-pending">

    <!-- ── Header ── -->
    <header class="app-header">
      <div class="app-header__brand">
        <img src="/assets/images/logo/logo_en.svg" alt="" class="app-header__logo" />
        <div>
          <h1>News Dashboard</h1>
          <p class="muted">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Manage articles across 3 languages
          </p>
        </div>
      </div>
      <div class="app-header__actions">
        <div class="user-badge" id="user-badge" hidden>
          <span class="user-badge__name" id="user-badge-name"></span>
          <span class="user-badge__role" id="user-badge-role"></span>
        </div>
        <a href="/users.html" class="ghost compact" id="link-manage-users" hidden>Manage Users</a>
        <button class="ghost compact" id="btn-logout" type="button">Log out</button>
        <button class="primary" id="btn-new" type="button">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Article
        </button>
      </div>
    </header>

    <main class="app-main">

      <!-- ── Stat cards ── -->
      <div class="stat-cards" id="stat-cards">
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--blue">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div class="stat-card__text">
            <span class="stat-value" id="stat-total">0</span>
            <span class="stat-label">Total</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--green">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </div>
          <div class="stat-card__text">
            <span class="stat-value" id="stat-published">0</span>
            <span class="stat-label">Published</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--amber">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </div>
          <div class="stat-card__text">
            <span class="stat-value" id="stat-draft">0</span>
            <span class="stat-label">Drafts</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-card__icon stat-card__icon--gray">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"/><rect x="1" y="3" width="22" height="5"/><line x1="10" y1="12" x2="14" y2="12"/></svg>
          </div>
          <div class="stat-card__text">
            <span class="stat-value" id="stat-archived">0</span>
            <span class="stat-label">Archived</span>
          </div>
        </div>
      </div>

      <!-- ── Filter bar ── -->
      <form class="filter-bar card" id="filter-form">
        <div class="search-field">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="filter-search" placeholder="Search title or content…" class="filter-search" />
        </div>
        <select id="filter-status" aria-label="Filter by status">
          <option value="">All Status</option>
          <option value="draft">Draft</option>
          <option value="published">Published</option>
          <option value="archived">Archived</option>
        </select>
        <select id="filter-category" aria-label="Filter by category">
          <option value="">All Categories</option>
          <option value="news">News</option>
          <option value="report">Report</option>
          <option value="announcement">Announcement</option>
          <option value="health">Health</option>
          <option value="education">Education</option>
          <option value="water">Water &amp; Sanitation</option>
          <option value="volunteer">Volunteers</option>
        </select>
        <button type="submit" class="primary compact">Filter</button>
        <button type="button" class="ghost compact" id="btn-reset">Reset</button>
      </form>

      <!-- ── Table / empty / loading ── -->
      <div id="table-area" class="table-card">
        <div class="loading-state"><div class="spinner"></div><span>Loading…</span></div>
      </div>

      <!-- ── Pagination ── -->
      <div class="pagination" id="pagination" style="display:none">
        <span class="muted" id="page-info"></span>
        <div class="page-btns">
          <button type="button" class="ghost compact" id="btn-prev" disabled>&#8592; Prev</button>
          <button type="button" class="ghost compact" id="btn-next" disabled>Next &#8594;</button>
        </div>
      </div>

    </main>
  </div>

  <!-- ══════════════════════════════════════════════
       MODAL — Create / Edit form
       ══════════════════════════════════════════════ -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" style="display:none">
    <div class="modal">
      <form class="news-form" id="news-form">
        <!-- Header -->
        <div class="form-header">
          <h3 id="form-title">Create Article</h3>
          <button type="button" class="btn-icon" id="btn-modal-close" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>

        <div class="modal-body">

          <!-- Language tabs -->
          <div class="lang-tabs" id="lang-tabs">
            <button type="button" class="lang-tab active" data-lang="en">English</button>
            <button type="button" class="lang-tab" data-lang="mrh">Mara <span class="tab-dot" id="dot-mrh" title="Not translated"></span></button>
            <button type="button" class="lang-tab" data-lang="my">Burmese <span class="tab-dot" id="dot-my" title="Not translated"></span></button>
          </div>

          <!-- Title -->
          <div class="field">
            <label>Title <span class="lang-badge" id="badge-title">EN</span></label>
            <input id="inp-title" placeholder="Article title (required)" />
          </div>

          <!-- Summary -->
          <div class="field">
            <label>Summary <span class="lang-badge" id="badge-summary">EN</span></label>
            <textarea id="inp-summary" rows="2" placeholder="Short excerpt shown in cards"></textarea>
          </div>

          <!-- Body (WYSIWYG) -->
          <div class="field field--editor">
            <label>Content <span class="lang-badge" id="badge-body">EN</span></label>
            <div id="editor-container"></div>
          </div>

          <!-- Image Options Toolbar (appears when clicking an image in editor) -->
          <div id="img-toolbar" class="img-toolbar" hidden>
            <span class="img-tb-label">SIZE</span>
            <button type="button" data-size="33%" class="img-tb-btn">S</button>
            <button type="button" data-size="50%" class="img-tb-btn">M</button>
            <button type="button" data-size="100%" class="img-tb-btn active">L</button>
            <span class="img-tb-sep"></span>
            <span class="img-tb-label">BORDER</span>
            <button type="button" data-border="none" class="img-tb-btn active">None</button>
            <button type="button" data-border="thin" class="img-tb-btn">Thin</button>
            <button type="button" data-border="normal" class="img-tb-btn">Normal</button>
            <span class="img-tb-sep"></span>
            <span class="img-tb-label">CAPTION</span>
            <input type="text" id="img-caption-input" class="img-tb-input" placeholder="Add image caption…">
          </div>

          <!-- ── Section divider ── -->
          <div class="form-divider">
            <span class="form-divider__label">Article Details</span>
          </div>

          <!-- Metadata grid -->
          <div class="form-grid">
            <div class="field">
              <label>Slug</label>
              <div class="input-group">
                <input id="inp-slug" placeholder="my-article" required />
                <button type="button" class="btn-mini" id="btn-auto-slug">Auto</button>
              </div>
            </div>
            <div class="field">
              <label>Author</label>
              <input id="inp-author" placeholder="TSD Comms" required />
            </div>
            <div class="field">
              <label>Category</label>
              <select id="inp-category">
                <option value="">Select category</option>
                <option value="news">News</option>
                <option value="report">Report</option>
                <option value="announcement">Announcement</option>
                <option value="health">Health</option>
                <option value="education">Education</option>
                <option value="water">Water &amp; Sanitation</option>
                <option value="volunteer">Volunteers</option>
              </select>
            </div>
          </div>

          <div class="form-grid form-grid--3">
            <div class="field">
              <label>Status</label>
              <select id="inp-status">
                <option value="draft">Draft</option>
                <option value="published">Published</option>
                <option value="archived">Archived</option>
              </select>
            </div>
            <div class="field">
              <label>Publish Date</label>
              <input type="date" id="inp-date" required />
            </div>
            <div class="field">
              <label>Tags (comma separated)</label>
              <input id="inp-tags" placeholder="health, outreach" />
            </div>
          </div>

          <!-- Featured image -->
          <div class="field">
            <label>Featured Image URL</label>
            <input id="inp-image" placeholder="https://…" />
            <div class="image-preview" id="image-preview" style="display:none">
              <img id="image-preview-img" alt="Preview" />
            </div>
          </div>

          <!-- Error -->
          <p class="form-error" id="form-error" style="display:none"></p>

        </div>

        <!-- Actions -->
        <div class="form-actions">
          <button type="button" class="ghost" id="btn-cancel">Cancel</button>
          <button type="submit" class="primary" id="btn-submit">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ══════════════════════════════════════════════
       MODAL — Forced password change (must_change_password)
       Non-dismissable: no close button, no backdrop-click-to-close.
       ══════════════════════════════════════════════ -->
  <div class="modal-backdrop" id="force-password-modal" hidden>
    <div class="modal modal--narrow">
      <form id="force-password-form" class="news-form">
        <div class="form-header">
          <h3>Set a new password</h3>
        </div>
        <div class="modal-body">
          <p class="muted">You're signed in with a temporary password. Choose a new one to continue.</p>
          <div class="field">
            <label for="fp-current">Current (temporary) password</label>
            <input type="password" id="fp-current" autocomplete="current-password" required />
          </div>
          <div class="field">
            <label for="fp-new">New password</label>
            <input type="password" id="fp-new" autocomplete="new-password" minlength="10" required />
          </div>
          <div class="field">
            <label for="fp-confirm">Confirm new password</label>
            <input type="password" id="fp-confirm" autocomplete="new-password" minlength="10" required />
          </div>
          <p class="form-error" id="fp-error" style="display:none"></p>
        </div>
        <div class="form-actions">
          <button type="submit" class="primary">Set password &amp; continue</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <script src="auth.js"></script>
  <script src="script.js"></script>
</body>
</html>
