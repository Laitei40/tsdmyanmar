<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Join our Team — TSD Myanmar</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="/manifest.json">
  <link id="site-favicon" rel="icon" href="/assets/images/logo/logo_en.svg" type="image/svg+xml">
  <script>
    (function(){
      try{
        const k = 'tsd_theme';
        const stored = localStorage.getItem(k) || 'system';
        if (stored === 'system'){
          const dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', dark? 'dark':'light');
        } else {
          document.documentElement.setAttribute('data-theme', stored);
        }
      }catch(e){}
    })();
  </script>
</head>
<body>
  <!-- Header loaded dynamically -->
  <div id="header"></div>

  <main>
    <div class="page-banner">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/" data-i18n="nav_home">Home</a>
        <span class="sep" aria-hidden="true">/</span>
        <span data-i18n="header_get_involved">Get Involved</span>
        <span class="sep" aria-hidden="true">/</span>
        <span class="current" data-i18n="join_our_team_title">Join our Team</span>
      </nav>
      <h1 data-i18n="join_our_team_title">Join our Team</h1>
      <p class="lead">Vacancies and ways to contribute professionally.</p>
    </div>

    <section class="content-section">
      <div class="coming-soon">
        <span class="coming-soon__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        </span>
        <h2>No open vacancies listed right now</h2>
        <p>Check back soon, or <a href="contact.html">contact us</a> to ask about upcoming opportunities.</p>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="js/core/theme.js"></script>
  <script src="js/core/icon-theme.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/core/i18n.js"></script>
  <script src="js/main.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
