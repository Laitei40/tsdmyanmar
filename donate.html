<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Donate - TSD Myanmar</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="manifest" href="/manifest.json">
  <link id="site-favicon" rel="icon" href="/assets/images/logo/logo_en.svg" type="image/svg+xml">
  <script>
    (function(){
      try{
        const k = 'tsd_theme';
        const stored = localStorage.getItem(k) || 'system';
        if (stored === 'system'){
          const dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', dark? 'dark':'light');
        } else {
          document.documentElement.setAttribute('data-theme', stored);
        }
      }catch(e){}
    })();
  </script>
</head>
<body>
  <!-- Header loaded dynamically -->
  <div id="header"></div>

  <main>
    <div class="page-banner">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/" data-i18n="nav_home">Home</a>
        <span class="sep" aria-hidden="true">/</span>
        <span data-i18n="header_get_involved">Get Involved</span>
        <span class="sep" aria-hidden="true">/</span>
        <span class="current" data-i18n="nav_donate">Donate</span>
      </nav>
      <h1 data-i18n="donate_title">Support / Donate</h1>
      <p class="lead">Your support funds education, food security, inclusion, and disaster relief programmes in Chin State.</p>
    </div>

    <section class="content-section">
      <div class="coming-soon">
        <span class="coming-soon__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </span>
        <h2>Online giving is coming soon</h2>
        <p>We're finalising our online donation options. In the meantime, <a href="contact.html">contact us</a> to arrange a donation directly.</p>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="js/core/theme.js"></script>
  <script src="js/core/icon-theme.js"></script>
  <script src="js/core/header.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/core/i18n.js"></script>
  <script src="js/main.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
