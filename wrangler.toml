# Wrangler configuration for the TSD site
# Add your account details and project settings as needed.
# This file includes an example D1 binding for the 'tsd_updates' database.

name = "tsdmyanmar"
compatibility_date = "2026-01-12"

# Build command & output directory are configured in the Cloudflare Pages dashboard.
# Do NOT set pages_build_output_dir here — the v2 BETA wrangler.toml reader
# resolves the path incorrectly (prepends ../) causing "outside of repository" errors.

# Bind your Cloudflare D1 database to the environment variable UPDATES_DB
[[d1_databases]]
binding = "UPDATES_DB"
database_name = "tsd_updates"
# Pin to specific D1 database (useful for local dev)
database_id = "bb376db4-497c-4ac3-9761-675b8a537422"

# This site is public-read-only — no admin auth lives here. Article management
# happens exclusively through the admin dashboard (separate Pages project, its
# own D1-backed session auth — see admin/_lib/auth.js).
# Bind Cloudflare R2 bucket so /api/images/:key can serve uploaded images.
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "tsd-images"

# Optional: add other settings such as zone_id, account_id, or site configuration
# Example:
# account_id = "your-account-id"
# route = "https://example.com/*"
# [site]
#   bucket = "public"
#   entry-point = "./"