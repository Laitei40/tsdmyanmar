<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Updates & News — TSD Myanmar</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" id="site-favicon" href="/assets/images/logo/logo_en.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/updates.css">
    <script>
      (function(){
        try{
          const k = 'tsd_theme';
          const stored = localStorage.getItem(k) || 'system';
          if (stored === 'system'){
            const dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            document.documentElement.setAttribute('data-theme', dark? 'dark':'light');
          } else {
            document.documentElement.setAttribute('data-theme', stored);
          }
        }catch(e){}
      })();
    </script>
</head>
<body>
  <!-- Header loaded dynamically -->
  <div id="header"></div>
  <main>
    <section class="updates-hero">
      <h1 data-i18n="updates_title">Updates & News</h1>
      <p class="lead">Recent activity, program progress, and transparency notes from Together for Sustainable Development. We publish concise, factual updates that explain what we did, why, and what comes next.</p>
    </section>

    <section class="updates-controls" aria-hidden="false">
      <div class="filter" aria-label="Filter updates by year">
        <label for="updates-year-filter" class="visually-hidden">Filter by year</label>
        <select id="updates-year-filter" aria-controls="updates-list">
          <option value="">All years</option>
        </select>
      </div>
      <div class="status" aria-live="polite" aria-atomic="true"><span id="updates-loading">Loading updates…</span></div>
    </section>

    <section id="updates-list" class="updates-list" role="list" aria-label="Updates and news">
      <p class="visually-hidden" data-i18n="loading">Loading updates…</p>
    </section>
  </main>
  <div id="footer"></div> 

  <script>window.LAYOUT_BASE_PATH = '/';</script>
  <script src="/js/core/theme.js"></script>
  <script src="/js/core/icon-theme.js"></script>
  <script src="/js/core/header.js"></script>
  <script src="/js/layout.js"></script>
  <script src="/js/core/i18n.js"></script>
  <script src="/js/pages/updates.js"></script>
  <script src="/js/sw-register.js"></script>
</body>
</html>
