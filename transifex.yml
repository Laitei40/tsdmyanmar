# Transifex GitHub Sync configuration for tsdmyanmar
# Docs: https://help.transifex.com/en/articles/6265125-github-installation-and-configuration
#
# This is the schema Transifex's GitHub Sync integration actually reads (Settings → Integrations →
# GitHub → "Add a path to your YAML configuration file" → transifex.yml), which is a `git:` / `filters:`
# structure — different from the legacy `tx` CLI's `.tx/config` (INI) format.

git:
  filters:
    # News articles: one JSON file per article under news-content/source/en/,
    # translated files land under news-content/translations/<lang>/ with the same filename.
    - filter_type: dir
      file_format: KEYVALUEJSON
      source_language: en
      source_file_dir: news-content/source/en
      source_file_extension: json
      translation_files_expression: 'news-content/translations/<lang>'

    # Shared UI strings
    - filter_type: file
      file_format: KEYVALUEJSON
      source_language: en
      source_file: i18n/en/common.json
      translation_files_expression: 'i18n/<lang>/common.json'

  settings:
    language_mapping:
      mrh: mrh
      my: my
